services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/climalert
      SPRING_DATASOURCE_USERNAME: climalert
      SPRING_DATASOURCE_PASSWORD: climalert
    depends_on:
      - db
  
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: climalert
      POSTGRES_USER: climalert 
      POSTGRES_PASSWORD: climalert
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: